<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Mine Body -->
  <circle cx="64" cy="64" r="34" fill="#3c3f46" stroke="#1f2125" stroke-width="4"/>

  <!-- Highlight -->
  <ellipse cx="52" cy="50" rx="12" ry="8" fill="#5b6068" opacity="0.6"/>

  <!-- Center Cap -->
  <circle cx="64" cy="64" r="8" fill="#23262b" stroke="#555" stroke-width="2"/>

  <!-- Spikes -->
  <g stroke="#1f2125" stroke-width="6" stroke-linecap="round">
    <line x1="64" y1="18" x2="64" y2="4"/>
    <line x1="64" y1="110" x2="64" y2="124"/>
    <line x1="18" y1="64" x2="4" y2="64"/>
    <line x1="110" y1="64" x2="124" y2="64"/>

    <line x1="34" y1="34" x2="24" y2="24"/>
    <line x1="94" y1="34" x2="104" y2="24"/>
    <line x1="34" y1="94" x2="24" y2="104"/>
    <line x1="94" y1="94" x2="104" y2="104"/>
  </g>

  <!-- Spike Tips -->
  <g fill="#666">
    <circle cx="64" cy="4" r="3"/>
    <circle cx="64" cy="124" r="3"/>
    <circle cx="4" cy="64" r="3"/>
    <circle cx="124" cy="64" r="3"/>
    <circle cx="24" cy="24" r="3"/>
    <circle cx="104" cy="24" r="3"/>
    <circle cx="24" cy="104" r="3"/>
    <circle cx="104" cy="104" r="3"/>
