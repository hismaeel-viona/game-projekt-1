<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
 
    <title>Reaktionsjäger</title>
 
    <style>
        * {
            box-sizing: border-box;
        }
 
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: Arial, sans-serif;
            color: white;
            background: linear-gradient(150deg, #111827, #1d4ed8);
        }
 
        .spiel {
            width: min(850px, 94vw);
        }
 
        h1,
        .untertitel {
            text-align: center;
        }
 
        .anzeigen {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 20px 0;
        }
 
        .karte {
            padding: 14px;
            text-align: center;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.14);
        }
 
        .wert {
            display: block;
            margin-top: 6px;
            font-size: 2rem;
            font-weight: bold;
        }
 
        #spielfeld {
            position: relative;
            height: 420px;
            overflow: hidden;
            border: 3px solid white;
            border-radius: 18px;
            background: #0f172a;
        }
 
        #ziel {
            position: absolute;
            width: 80px;
            height: 80px;

            border: none;
            border-radius: 50%;

            background: #22c55e;
            box-shadow: 0 0 30px #22c55e;

            cursor: pointer;
            display: none;
            margin: -40px 0 0 -40px;
        }
 
        .steuerung {
            margin-top: 16px;
            text-align: center;
        }
 
        #start {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
 
            font-size: 1rem;
            font-weight: bold;
 
            background: #facc15;
            color: #111827;
 
            cursor: pointer;
        }
 
        #meldung {
            min-height: 28px;
            text-align: center;
            font-weight: bold;
        }
 
        @media (max-width: 600px) {
            .anzeigen {
                grid-template-columns: 1fr;
            }
 
            #spielfeld {
                height: 350px;
            }
        }
</style>
</head>
 
<body>
<main class="spiel">
<h1>Reaktionsjäger</h1>
 
        <p class="untertitel">
            Triff das Ziel so oft wie möglich.
</p>
 
        <section class="anzeigen">
<div class="karte">
                Punkte
<span id="punkte" class="wert">0</span>
</div>
 
            <div class="karte">
                Zeit
<span id="zeit" class="wert">20</span>
</div>
 
            <div class="karte">
                Rekord
<span id="rekord" class="wert">0</span>
</div>
</section>
 
        <section id="spielfeld">
<button id="ziel" aria-label="Ziel"></button>
</section>
 
        <div class="steuerung">
<button id="start">Spiel starten</button>
</div>
 
        <p id="meldung">Bereit?</p>
</main>
 
    <script>
        const spielfeld = document.getElementById("spielfeld");
        const ziel = document.getElementById("ziel");
        const startTaste = document.getElementById("start");
 
        const punkteAnzeige = document.getElementById("punkte");
        const zeitAnzeige = document.getElementById("zeit");
        const rekordAnzeige = document.getElementById("rekord");
        const meldung = document.getElementById("meldung");
 
        let punkte = 0;
        let restzeit = 20;
        let spielLaeuft = false;
        let timerId = null;
        let rekord = 0;
        
        // Target movement
        let targetX = 0;
        let targetY = 0;
        let velocityX = 5;
        let velocityY = 5;
        let animationId = null;
 
        function anzeigeAktualisieren() {
            punkteAnzeige.textContent = punkte;
            zeitAnzeige.textContent = restzeit;
            rekordAnzeige.textContent = rekord;
        }
 
        function zielInMitteSetzen() {
            ziel.style.left = "50%";
            ziel.style.top = "50%";
        }

        function zielZuZufaelligerStelleSetzen() {
            const spielfeldWidth = spielfeld.offsetWidth;
            const spielfeldHeight = spielfeld.offsetHeight;
            
            const minLeft = 40;
            const maxLeft = spielfeldWidth - 40;
            const minTop = 40;
            const maxTop = spielfeldHeight - 40;
            
            const randomLeft = Math.random() * (maxLeft - minLeft) + minLeft;
            const randomTop = Math.random() * (maxTop - minTop) + minTop;
            
            ziel.style.left = randomLeft + "px";
            ziel.style.top = randomTop + "px";
        }

        function updateTargetPosition() {
            const spielfeldWidth = spielfeld.offsetWidth;
            const spielfeldHeight = spielfeld.offsetHeight;
            const targetRadius = 40; // half of 80px width/height
            
            // Update position
            targetX += velocityX;
            targetY += velocityY;
            
            // Bounce off walls
            if (targetX - targetRadius <= 0 || targetX + targetRadius >= spielfeldWidth) {
                velocityX *= -1;
                targetX = Math.max(targetRadius, Math.min(spielfeldWidth - targetRadius, targetX));
            }
            
            if (targetY - targetRadius <= 0 || targetY + targetRadius >= spielfeldHeight) {
                velocityY *= -1;
                targetY = Math.max(targetRadius, Math.min(spielfeldHeight - targetRadius, targetY));
            }
            
            // Apply position to DOM
            ziel.style.left = targetX + "px";
            ziel.style.top = targetY + "px";
            
            if (spielLaeuft) {
                animationId = requestAnimationFrame(updateTargetPosition);
            }
        }
 
        function spielStarten() {
            punkte = 0;
            restzeit = 20;
            spielLaeuft = true;
 
            anzeigeAktualisieren();
 
            meldung.textContent = "Los!";
            startTaste.disabled = true;
            ziel.style.display = "block";
 
            // Initialize target at random position with random velocity
            const spielfeldWidth = spielfeld.offsetWidth;
            const spielfeldHeight = spielfeld.offsetHeight;
            targetX = 40 + Math.random() * (spielfeldWidth - 80);
            targetY = 40 + Math.random() * (spielfeldHeight - 80);
            
            velocityX = (Math.random() - 0.5) * 10;
            velocityY = (Math.random() - 0.5) * 10;
            
            if (velocityX === 0) velocityX = 5;
            if (velocityY === 0) velocityY = 5;

            // Start animation loop
            if (animationId) cancelAnimationFrame(animationId);
            updateTargetPosition();

            clearInterval(timerId);

            timerId = setInterval(function () {
                restzeit--;

                anzeigeAktualisieren();

                if (restzeit <= 0) {
                    spielBeenden();
                }
            }, 1000);
        }
 
        function spielBeenden() {
            spielLaeuft = false;
 
            clearInterval(timerId);
            if (animationId) cancelAnimationFrame(animationId);

            // Rekord prüfen und speichern
            if (punkte > rekord) {
                rekord = punkte;
                try {
                    localStorage.setItem('reaktionsjaeger_rekord', String(rekord));
                } catch (e) {
                    // ignore storage errors
                }
            }

            anzeigeAktualisieren();

            ziel.style.display = "none";
            startTaste.disabled = false;

            meldung.textContent = "Zeit vorbei. Du hast " + punkte + " Punkte erreicht.";
        }
 
        ziel.addEventListener("click", function () {
            if (!spielLaeuft) {
                return;
            }
 
            punkte++;
 
            anzeigeAktualisieren();
            
            // Move to random position on click
            const spielfeldWidth = spielfeld.offsetWidth;
            const spielfeldHeight = spielfeld.offsetHeight;
            targetX = 40 + Math.random() * (spielfeldWidth - 80);
            targetY = 40 + Math.random() * (spielfeldHeight - 80);
        });
 
        startTaste.addEventListener("click", spielStarten);
 
        // Aufgabe 2:
        // Rekord laden und speichern.
        try {
            const saved = localStorage.getItem('reaktionsjaeger_rekord');
            if (saved !== null) {
                rekord = parseInt(saved, 10) || 0;
            }
        } catch (e) {
            rekord = 0;
        }
 
        // Aufgabe 3:
        // Eine eigene Erweiterung ergänzen.
 
        anzeigeAktualisieren();
</script>
</body>
</html>
