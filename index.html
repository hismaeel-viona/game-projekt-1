<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
 
    <title>Reaktionsjäger</title>
 
    <style>
        * {
            box-sizing: border-box;
        }
 
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: Arial, sans-serif;
            color: white;
            background: linear-gradient(150deg, #111827, #1d4ed8);
        }
 
        .container {
            display: flex;
            gap: 20px;
            width: min(1100px, 96vw);
        }

        .options {
            width: 180px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .option-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .option-group label {
            font-size: 0.85rem;
            font-weight: bold;
        }

        .option-group input[type="range"] {
            width: 100%;
            cursor: pointer;
        }

        .option-value {
            font-size: 0.85rem;
            text-align: center;
            color: #facc15;
        }

        .spiel {
            flex: 1;
            min-width: 300px;
        }
 
        h1,
        .untertitel {
            text-align: center;
        }
 
        .anzeigen {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 20px 0;
        }
 
        .karte {
            padding: 14px;
            text-align: center;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.14);
        }
 
        .wert {
            display: block;
            margin-top: 6px;
            font-size: 2rem;
            font-weight: bold;
        }
 
        #spielfeld {
            position: relative;
            height: 420px;
            overflow: hidden;
            border: 3px solid white;
            border-radius: 18px;
            background: #0f172a;
        }
 
        #target {
            position: absolute;
            width: 80px;
            height: 80px;

            border: none;
            border-radius: 50%;

            background: #22c55e;
            box-shadow: 0 0 30px #22c55e;

            cursor: pointer;
            display: none;
            margin: -40px 0 0 -40px;
        }

        .fake-target {
            position: absolute;
            width: 80px;
            height: 80px;

            border: none;
            border-radius: 50%;

            background: #ef4444;
            box-shadow: 0 0 30px #ef4444;

            cursor: pointer;
            display: none;
            margin: -40px 0 0 -40px;
        }
 
        .steuerung {
            margin: 16px 0 0;
            text-align: center;
        }
 
        #start {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
 
            font-size: 1rem;
            font-weight: bold;
 
            background: #facc15;
            color: #111827;
 
            cursor: pointer;
        }
 
        #meldung {
            min-height: 28px;
            text-align: center;
            font-weight: bold;
        }
 
        @media (max-width: 900px) {
            .container {
                flex-direction: column;
            }

            .options {
                width: 100%;
                flex-direction: row;
                gap: 12px;
            }

            .option-group {
                flex: 1;
            }
        }

        @media (max-width: 600px) {
            .anzeigen {
                grid-template-columns: 1fr;
            }

            #spielfeld {
                height: 350px;
            }
        }
</style>
</head>
 
<body>
<div class="container">
    <section class="options">
        <div class="option-group">
            <label for="gameTimeSlider">Game Time</label>
            <input type="range" id="gameTimeSlider" min="5" max="30" value="20">
            <span class="option-value" id="gameTimeValue">20s</span>
        </div>
        <div class="option-group">
            <label for="speedSlider">Target Speed</label>
            <input type="range" id="speedSlider" min="1" max="10" value="5">
            <span class="option-value" id="speedValue">5</span>
        </div>
        <div class="option-group">
            <label for="fakeCountSlider">Fake Targets</label>
            <input type="range" id="fakeCountSlider" min="0" max="3" value="0">
            <span class="option-value" id="fakeCountValue">0</span>
        </div>
    </section>

    <main class="spiel">
<h1>Reaktionsjäger</h1>
 
        <p class="untertitel">
            Triff das Ziel so oft wie möglich.
</p>
 
        <section class="anzeigen">
<div class="karte">
                Punkte
<span id="punkte" class="wert">0</span>
</div>
 
            <div class="karte">
                Zeit
<span id="zeit" class="wert">20</span>
</div>
 
            <div class="karte">
                Rekord
<span id="rekord" class="wert">0</span>
</div>
</section>
 
        <section id="spielfeld">
            <button id="target" aria-label="Target"></button>
        </section>
 
        <div class="steuerung">
            <button id="start">Spiel starten</button>
        </div>
 
        <p id="meldung">Ready?</p>
    </main>
</div>
 
    <script>
const gameField = document.getElementById("spielfeld");
        const target = document.getElementById("target");
        const startButton = document.getElementById("start");

        const pointsDisplay = document.getElementById("punkte");
        const timeDisplay = document.getElementById("zeit");
        const recordDisplay = document.getElementById("rekord");
        const message = document.getElementById("meldung");

        const gameTimeSlider = document.getElementById("gameTimeSlider");
        const speedSlider = document.getElementById("speedSlider");
        const fakeCountSlider = document.getElementById("fakeCountSlider");
        const gameTimeValue = document.getElementById("gameTimeValue");
        const speedValue = document.getElementById("speedValue");
        const fakeCountValue = document.getElementById("fakeCountValue");

        let points = 0;
        let remainingTime = 20;
        let gameRunning = false;
        let timerId = null;
        let record = 0;
        let gameTime = 20;
        let baseSpeed = 5;
        let fakeTargetCount = 0;
        let fakeTargets = [];
        
        // Target movement
        let targetX = 0;
        let targetY = 0;
        let velocityX = 5;
        let velocityY = 5;
        let animationId = null;

        // Slider change listeners
        gameTimeSlider.addEventListener("input", function () {
            gameTime = parseInt(this.value);
            gameTimeValue.textContent = gameTime + "s";
        });

        speedSlider.addEventListener("input", function () {
            baseSpeed = parseInt(this.value);
            speedValue.textContent = baseSpeed;
        });

        fakeCountSlider.addEventListener("input", function () {
            fakeTargetCount = parseInt(this.value);
            fakeCountValue.textContent = fakeTargetCount;
        });

        function updateDisplay() {
            pointsDisplay.textContent = points;
            timeDisplay.textContent = remainingTime;
            recordDisplay.textContent = record;
        }

        function createFakeTargets() {
            fakeTargets = [];
            for (let i = 0; i < fakeTargetCount; i++) {
                const fakeTarget = document.createElement("button");
                fakeTarget.className = "fake-target";
                fakeTarget.setAttribute("aria-label", "Fake target");
                gameField.appendChild(fakeTarget);
                
                const fakeData = {
                    element: fakeTarget,
                    x: 40 + Math.random() * (gameField.offsetWidth - 80),
                    y: 40 + Math.random() * (gameField.offsetHeight - 80),
                    vx: (Math.random() - 0.5) * baseSpeed * 2,
                    vy: (Math.random() - 0.5) * baseSpeed * 2
                };
                
                fakeTarget.addEventListener("click", function (e) {
                    e.stopPropagation();
                    if (gameRunning) {
                        endGame(true);
                    }
                });
                
                fakeTargets.push(fakeData);
            }
        }

        function removeFakeTargets() {
            fakeTargets.forEach(ft => ft.element.remove());
            fakeTargets = [];
        }
 
        function setTargetCenter() {
            target.style.left = "50%";
            target.style.top = "50%";
        }

        function setTargetRandomPosition() {
            const gameFieldWidth = gameField.offsetWidth;
            const gameFieldHeight = gameField.offsetHeight;
            
            const minLeft = 40;
            const maxLeft = gameFieldWidth - 40;
            const minTop = 40;
            const maxTop = gameFieldHeight - 40;
            
            const randomLeft = Math.random() * (maxLeft - minLeft) + minLeft;
            const randomTop = Math.random() * (maxTop - minTop) + minTop;
            
            target.style.left = randomLeft + "px";
            target.style.top = randomTop + "px";
        }

        function updateTargetPosition() {
            const gameFieldWidth = gameField.offsetWidth;
            const gameFieldHeight = gameField.offsetHeight;
            const targetRadius = 40; // half of 80px width/height
            
            // Update main target position
            targetX += velocityX;
            targetY += velocityY;
            
            // Bounce off walls
            if (targetX - targetRadius <= 0 || targetX + targetRadius >= gameFieldWidth) {
                velocityX *= -1;
                targetX = Math.max(targetRadius, Math.min(gameFieldWidth - targetRadius, targetX));
            }
            
            if (targetY - targetRadius <= 0 || targetY + targetRadius >= gameFieldHeight) {
                velocityY *= -1;
                targetY = Math.max(targetRadius, Math.min(gameFieldHeight - targetRadius, targetY));
            }
            
            // Apply position to DOM
            target.style.left = targetX + "px";
            target.style.top = targetY + "px";

            // Update fake targets
            fakeTargets.forEach(ft => {
                ft.x += ft.vx;
                ft.y += ft.vy;

                // Bounce off walls
                if (ft.x - targetRadius <= 0 || ft.x + targetRadius >= gameFieldWidth) {
                    ft.vx *= -1;
                    ft.x = Math.max(targetRadius, Math.min(gameFieldWidth - targetRadius, ft.x));
                }
                
                if (ft.y - targetRadius <= 0 || ft.y + targetRadius >= gameFieldHeight) {
                    ft.vy *= -1;
                    ft.y = Math.max(targetRadius, Math.min(gameFieldHeight - targetRadius, ft.y));
                }

                ft.element.style.left = ft.x + "px";
                ft.element.style.top = ft.y + "px";
            });
            
            if (gameRunning) {
                animationId = requestAnimationFrame(updateTargetPosition);
            }
        }
 
        function startGame() {
            points = 0;
            remainingTime = gameTime;
            gameRunning = true;

            // Disable sliders during game
            gameTimeSlider.disabled = true;
            speedSlider.disabled = true;
            fakeCountSlider.disabled = true;

            updateDisplay();

            message.textContent = "Go!";
            startButton.disabled = true;
            target.style.display = "block";

            // Create fake targets
            createFakeTargets();
            fakeTargets.forEach(ft => {
                ft.element.style.display = "block";
                if (ft.vx === 0) ft.vx = baseSpeed;
                if (ft.vy === 0) ft.vy = baseSpeed;
            });

            // Initialize target at random position with random velocity
            const gameFieldWidth = gameField.offsetWidth;
            const gameFieldHeight = gameField.offsetHeight;
            targetX = 40 + Math.random() * (gameFieldWidth - 80);
            targetY = 40 + Math.random() * (gameFieldHeight - 80);
            
            velocityX = (Math.random() - 0.5) * baseSpeed * 2;
            velocityY = (Math.random() - 0.5) * baseSpeed * 2;
            
            if (velocityX === 0) velocityX = baseSpeed;
            if (velocityY === 0) velocityY = baseSpeed;

            // Start animation loop
            if (animationId) cancelAnimationFrame(animationId);
            updateTargetPosition();

            clearInterval(timerId);

            timerId = setInterval(function () {
                remainingTime--;

                updateDisplay();

                if (remainingTime <= 0) {
                    endGame();
                }
            }, 1000);
        }
 
function endGame(hitFake = false) {
            gameRunning = false;

            clearInterval(timerId);
            if (animationId) cancelAnimationFrame(animationId);

            // Check and save record
            if (points > record) {
                record = points;
                try {
                    localStorage.setItem('reaction_hunter_record', String(record));
                } catch (e) {
                    // ignore storage errors
                }
            }

            updateDisplay();

            target.style.display = "none";
            fakeTargets.forEach(ft => ft.element.style.display = "none");
            removeFakeTargets();
            
            startButton.disabled = false;
            gameTimeSlider.disabled = false;
            speedSlider.disabled = false;
            fakeCountSlider.disabled = false;

            if (hitFake) {
                message.textContent = "Oops! You hit a fake target. You lost!";
            } else {
                message.textContent = "Time's up. You scored " + points + " points.";
            }
        }
 
        target.addEventListener("click", function () {
            if (!gameRunning) {
                return;
            }
 
            points++;
 
            updateDisplay();
            
            // Move to random position on click
            const gameFieldWidth = gameField.offsetWidth;
            const gameFieldHeight = gameField.offsetHeight;
            targetX = 40 + Math.random() * (gameFieldWidth - 80);
            targetY = 40 + Math.random() * (gameFieldHeight - 80);
        });

        startButton.addEventListener("click", startGame);
        
        // Load saved record
        try {
            const saved = localStorage.getItem('reaction_hunter_record');
            if (saved !== null) {
                record = parseInt(saved, 10) || 0;
            }
        } catch (e) {
            record = 0;
        }

        // Task 3:
        // Add your own enhancement.
 
        updateDisplay();
</script>
</body>
</html>
