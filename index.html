<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
 
    <title>Reaktionsjäger</title>
 
    <link rel="stylesheet" href="src/style.css">
</head>
 
<body>
<div class="container">
    <section class="options">
        <div class="option-group">
            <label for="gameTimeSlider">Game Time</label>
            <input type="range" id="gameTimeSlider" min="5" max="30" value="20">
            <span class="option-value" id="gameTimeValue">20s</span>
        </div>
        <div class="option-group">
            <label for="speedSlider">Target Speed</label>
            <input type="range" id="speedSlider" min="1" max="10" value="5">
            <span class="option-value" id="speedValue">5</span>
        </div>
        <div class="option-group">
            <label for="fakeCountSlider">Fake Targets</label>
            <input type="range" id="fakeCountSlider" min="0" max="3" value="0">
            <span class="option-value" id="fakeCountValue">0</span>
        </div>
        <div class="option-group">
            <label for="difficultySelector">Difficulty</label>
            <select id="difficultySelector">
                <option value="easy">Easy</option>
                <option value="medium" selected>Medium</option>
                <option value="hard">Hard</option>
            </select>
        </div>
        <div class="option-group">
            <label for="squareCountSlider">Count of squares</label>
            <input type="range" id="squareCountSlider" min="2" max="16" value="8">
            <span class="option-value" id="squareCountValue">8</span>
        </div>
        <div class="option-group">
            <label for="starCountSlider">Count of stars</label>
            <input type="range" id="starCountSlider" min="8" max="60" value="24">
            <span class="option-value" id="starCountValue">24</span>
        </div>
    </section>

    <main class="spiel">
<h1>Reaktionsjäger</h1>
 
        <p class="untertitel">
            Triff das Ziel so oft wie möglich.
</p>
 
        <section class="anzeigen">
<div class="karte">
                Punkte
<span id="punkte" class="wert">0</span>
</div>
 
            <div class="karte">
                Zeit
<span id="zeit" class="wert">20</span>
</div>
 
            <div class="karte">
                Rekord
<span id="rekord" class="wert">0</span>
</div>
</section>
 
        <section id="spielfeld">
            <button id="target" aria-label="Target"></button>
        </section>
 
        <div class="steuerung">
            <button id="start">Spiel starten</button>
        </div>
 
        <section class="highscore">
            <h2>Highscore-Liste</h2>
            <ol id="highscoreEntries">
                <li>Keine Einträge</li>
            </ol>
            <button id="clearHighscores" class="clear-button">Highscores löschen</button>
        </section>

        <section class="highscore-entry hidden" id="highscoreEntryForm">
            <label for="highscoreText">Text für aktuellen Score eingeben:</label>
            <div class="highscore-entry-row">
                <input type="text" id="highscoreText" maxlength="50" placeholder="Kurztext eingeben" />
                <button id="submitHighscore">Speichern</button>
            </div>
        </section>

        <p id="meldung">Ready?</p>
    </main>
</div>
 
    <script type="module" src="src/game.js"></script>
</body>
</html>
